apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.articleService.name }}
  labels:
    app: {{ .Values.articleService.name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.articleService.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Values.articleService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.articleService.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.articleService.port }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: {{ .Values.articleService.serviceAccount.create | ternary (include "fnmp.fullname" .) "default" }}
      containers:
        - name: {{ .Values.articleService.name }}
          image: "{{ .Values.articleService.image.repository }}:{{ .Values.articleService.image.tag }}"
          imagePullPolicy: {{ .Values.articleService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.articleService.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.articleService.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fnmp-secrets
                  key: postgres-password
                  optional: true
          resources:
            {{- toYaml .Values.articleService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.articleService.health.livenessPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.articleService.health.readinessPath }}
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]