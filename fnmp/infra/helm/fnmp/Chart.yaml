apiVersion: v2
name: fnmp
description: Financial News Management Platform
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: 15.5.6
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 19.6.4
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: kafka
    version: 29.3.1
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: opensearch
    version: 2.20.0
    repository: https://opensearch-project.github.io/helm-charts/
    condition: opensearch.enabled