groups:
  - name: fnmp-service-alerts
    interval: 30s

    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.application }} error rate exceeded 1%"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }} for the last 5 minutes"
          runbook: "https://github.com/anomalyco/NewsWire-Lite/docs/ops/DR_RUNBOOK.md"

      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "P99 latency exceeded 1s on {{ $labels.application }}"
          description: "P99 is {{ $value }}s on {{ $labels.instance }}"
          runbook: "https://github.com/anomalyco/NewsWire-Lite/docs/ops/DR_RUNBOOK.md"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_fetch_manager_records_lag{group=~"article-service-persister|search-service-indexer"} > 1000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer lag > 1000 for group {{ $labels.group }}"
          description: "Consumer group {{ $labels.group }} has {{ $value }} records lag"

      - alert: KafkaConsumerLagCritical
        expr: kafka_consumer_fetch_manager_records_lag{group=~"article-service-persister|search-service-indexer"} > 10000
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Kafka consumer lag > 10000 for group {{ $labels.group }}"
          description: "Consumer group {{ $labels.group }} has {{ $value }} records lag — consumer may be stuck"

      - alert: PostgresConnectionPoolExhausted
        expr: hikaricp_connections_pending > 0
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "DB connection pool has pending requests"
          description: "{{ $labels.application }} has {{ $value }} pending DB connections"

      - alert: PostgresConnectionPoolFull
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "DB connection pool > 80% utilized"
          description: "{{ $labels.application }} has {{ $value | humanizePercentage }} of connections in use"

      - alert: HighJvmMemoryUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "JVM heap > 85% utilized"
          description: "{{ $labels.application }} heap is {{ $value | humanizePercentage }} used"

      - alert: InstanceDown
        expr: up{job=~"fnmp-.*"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.job }} instance {{ $labels.instance }} has been unreachable for 1 minute"

      - alert: ReplicationLagExceeded
        expr: pg_replication_lag_seconds > 60
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL replication lag > 60s"
          description: "Replication lag is {{ $value }}s"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Disk space below 10% on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} has {{ $value | humanizePercentage }} free"

      - alert: CacheHitRateLow
        expr: rate(redis_hits_total[5m]) / (rate(redis_hits_total[5m]) + rate(redis_misses_total[5m])) < 0.5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis cache hit rate below 50%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"