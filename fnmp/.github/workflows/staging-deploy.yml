name: FNMP Staging Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: fnmp-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build all modules
        run: ./mvnw package -DskipTests
        working-directory: fnmp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Build and push images
        run: |
          for service in article-service search-service ingestion-service; do
            IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$service
            SHA_TAG=${{ github.sha }}
            echo "Building $IMAGE:$SHA_TAG"
            
            docker build \
              -f fnmp/$service/Dockerfile \
              -t $IMAGE:$SHA_TAG \
              -t $IMAGE:latest \
              fnmp
            
            docker push $IMAGE:$SHA_TAG
            docker push $IMAGE:latest
          done

      - name: Trivy scan all images
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/article-service:${{ github.sha }}
          format: sarif
          output: trivy-article-service.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/search-service:${{ github.sha }}
          format: sarif
          output: trivy-search-service.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ingestion-service:${{ github.sha }}
          format: sarif
          output: trivy-ingestion-service.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Build Helm dependencies
        run: helm dependency build ./fnmp/infra/helm/fnmp

      - name: Deploy with Helm
        run: |
          helm upgrade --install fnmp ./fnmp/infra/helm/fnmp \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set global.environment=staging \
            --set articleService.image.tag=${{ github.sha }} \
            --set searchService.image.tag=${{ github.sha }} \
            --set ingestionService.image.tag=${{ github.sha }} \
            --set secrets.postgresPassword=${{ secrets.STAGING_POSTGRES_PASSWORD }} \
            --set secrets.jwtSecret=${{ secrets.STAGING_JWT_SECRET }} \
            --wait \
            --timeout 5m

      - name: Smoke test
        run: |
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod -l app=article-service -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl wait --for=condition=ready pod -l app=search-service -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl wait --for=condition=ready pod -l app=ingestion-service -n ${{ env.NAMESPACE }} --timeout=120s

          echo "Running smoke tests..."
          ARTICLE_SVC=$(kubectl get pod -l app=article-service -n ${{ env.NAMESPACE }} -o jsonpath="{.items[0].metadata.name}")
          SEARCH_SVC=$(kubectl get pod -l app=search-service -n ${{ env.NAMESPACE }} -o jsonpath="{.items[0].metadata.name}")
          INGEST_SVC=$(kubectl get pod -l app=ingestion-service -n ${{ env.NAMESPACE }} -o jsonpath="{.items[0].metadata.name}")

          # Health checks
          kubectl exec $ARTICLE_SVC -n ${{ env.NAMESPACE }} -- wget -qO- http://localhost:8080/actuator/health/liveness || exit 1
          kubectl exec $SEARCH_SVC -n ${{ env.NAMESPACE }} -- wget -qO- http://localhost:8081/actuator/health/liveness || exit 1
          kubectl exec $INGEST_SVC -n ${{ env.NAMESPACE }} -- wget -qO- http://localhost:8082/actuator/health/liveness || exit 1

          # E2E: create article via ingestion → verify via article-service
          ARTICLE_ID=$(kubectl exec $INGEST_SVC -n ${{ env.NAMESPACE }} -- \
            curl -s -X POST http://localhost:8082/api/v1/articles \
            -H 'Content-Type: application/json' \
            -d '{"headline":"Smoke Test","source":"FNMP","publicationTimestamp":"2026-07-17T00:00:00Z"}' | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          
          if [ -z "$ARTICLE_ID" ]; then
            echo "FAIL: Article creation via ingestion returned no ID"
            exit 1
          fi
          echo "Created article: $ARTICLE_ID"

          # Read back via article-service
          READ_BACK=$(kubectl exec $ARTICLE_SVC -n ${{ env.NAMESPACE }} -- \
            curl -s http://localhost:8080/api/v1/articles/$ARTICLE_ID | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('headline',''))")
          
          if [ "$READ_BACK" != "Smoke Test" ]; then
            echo "FAIL: Article read-back mismatch. Got: $READ_BACK"
            exit 1
          fi

          echo "Smoke tests passed"