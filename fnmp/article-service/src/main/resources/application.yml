server:
  port: 8080
  tomcat:
    max-swallow-size: 2MB
    max-http-form-post-size: 2MB

spring:
  application:
    name: article-service

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 2MB

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
    include: observability

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/fnmp
    username: ${POSTGRES_USER:fnmp}
    password: ${POSTGRES_PASSWORD:fnmp}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 1800000
      idle-timeout: 600000
      validation-timeout: 2000
      leak-detection-threshold: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/auth/realms/fnmp}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.request.size: 1048576
        compression.type: snappy
    consumer:
      group-id: article-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.fnmp.common.event
        max.partition.fetch.bytes: 5242880
        fetch.max.wait.ms: 500

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          time-between-eviction-runs: 30s
      timeout: 2000ms
      connect-timeout: 500ms

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100

resilience4j:
  circuitbreaker:
    instances:
      openSearchSearch:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      kafkaPublish:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
  retry:
    instances:
      kafkaPublish:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.kafka.KafkaException
      openSearchSearch:
        maxAttempts: 2
        waitDuration: 200ms
        retryExceptions:
          - java.io.IOException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        readiness:
          include: db, redis, kafka, circuitbreakers
        liveness:
          include: ping, diskSpace

logging:
  level:
    com.fnmp: INFO
    org.springframework.security: INFO
    io.github.resilience4j: DEBUG