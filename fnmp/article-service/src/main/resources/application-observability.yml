management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
    propagation:
      type: w3c
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  include-application-name: true
  pattern:
    level: "%5p [%mdc{traceId:-},%mdc{spanId:-}]"